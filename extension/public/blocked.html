<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bloqueado - HelpGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            color: #059669;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .url {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin: 20px 0;
            word-break: break-all;
        }

        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #dc2626;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
        }

        .message {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .resources {
            background: #f0fdf4;
            border-left: 4px solid #059669;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 6px;
        }

        .resources h3 {
            color: #059669;
            margin-bottom: 10px;
        }

        .resources a {
            display: block;
            color: #059669;
            text-decoration: none;
            margin: 5px 0;
            font-size: 14px;
        }

        .resources a:hover {
            text-decoration: underline;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #059669;
            color: white;
        }

        .btn-primary:hover {
            background: #047857;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Site Bloqueado</h1>
        
        <div class="url" id="urlDisplay"></div>

        <div class="message">
            Você ativou o bloqueio de sites de apostas. Esta é uma proteção para sua saúde financeira e bem-estar.
        </div>

        <div class="timer" id="timerDisplay">30:00</div>

        <div class="resources">
            <h3>Recursos de Ajuda</h3>
            <a href="https://www.ncpg.org/" target="_blank">🌐 National Council on Problem Gambling</a>
            <a href="https://www.gamblersanonymous.org/" target="_blank">👥 Gamblers Anonymous</a>
            <a href="https://www.helpgames.com.br/recursos" target="_blank">📚 HelpGames - Recursos</a>
            <a href="https://www.helpgames.com.br/modo-crise" target="_blank">🆘 Modo Crise - Suporte Imediato</a>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="dashboardBtn">📊 Dashboard</button>
            <button class="btn btn-secondary" id="helpBtn">❓ Ajuda</button>
        </div>
    </div>

    <script>
        // Extrair URL da query string
        const urlParams = new URLSearchParams(window.location.search);
        const blockedUrl = urlParams.get('url');
        
        if (blockedUrl) {
            document.getElementById('urlDisplay').textContent = blockedUrl;
        }

        // Timer
        let timeRemaining = 30 * 60; // 30 minutos em segundos
        
        function updateTimer() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            if (timeRemaining > 0) {
                timeRemaining--;
                setTimeout(updateTimer, 1000);
            }
        }
        
        updateTimer();

        // Botões
        document.getElementById('dashboardBtn').addEventListener('click', () => {
            window.location.href = 'https://helpgames.com.br/dashboard';
        });

        document.getElementById('helpBtn').addEventListener('click', () => {
            window.location.href = 'https://helpgames.com.br/modo-crise';
        });
    </script>
</body>
</html>
